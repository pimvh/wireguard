---
galaxy_info:
  author: Pim van Helvoirt
  description: role to configure wireguard VPN.

  license: GPL-3.0-only
  min_ansible_version: "2.14"

  platforms:
    - name: Ubuntu
      versions:
        - jammy
    - name: Debian
      versions:
        - bullseye

  galaxy_tags:
    - vpn
    - wireguard
    - dualstack

dependencies: []
argument_specs:
  main:
    short_description: The main entry point for the wireguard role.
    description: |
      This entrypoint configures a wireguard VPN on the system.
    options:
      wg_default_config_dir:
        type: str
        default: /etc/wireguard
        required: false
        description: in which directory to configure wireguard (serverside)

      wg_default_client_config_dir:
        type: str
        default: $HOME
        required: false
        description: in which directory to save wireguard configurations (clientside)

      wg_interfaces:
        type: list
        required: true
        elements: dict
        options:
          name:
            type: str
            required: true
            description: name of wireguard interface to create

          wg_range_v4:
            type: str
            required: true
            description: IPv4 CIDR range of wireguard interface to create

          domain:
            type: str
            required: true
            description: DNS domain of the server

          wg_range_v6:
            type: str
            required: false
            description: IPv6 CIDR range of wireguard interface to create, optional to create v4 only VPN

          wg_port:
            type: str
            required: true
            description: port to expose wireguard interface on

          wg_show:
            type: bool
            default: true
            required: false
            description: whether to display the wireguard interface configuration

          wg_config_dir:
            type: str
            default: /etc/wireguard
            required: false
            description: in which directory to store the wireguard interface configuration (defaults to global passed one)
          wg_client_config_dir:
            type: str
            default: $HOME
            required: false
            description: in which directory to store the wireguard interface configuration (clientside) (defaults to global passed one)

          wg_client_config_storage_host:
            type: str
            required: true
            description: in which host the client configurations will be stored.

          generate_server_keys:
            type: bool
            required: true
            description: boolean to indicate whether the serverside keys will be (re)generated

          generate_preshared_key:
            type: bool
            required: true
            description: boolean to indicate whether the preshared key will be (re)generated

          wg_dns:
            type: str
            required: true
            description: DNS which will be used for this wireguard interface

          wg_routed_ips:
            type: str
            required: true
            description: IP addresses which are allowed to be routed over this VPN interface.

          allow_inet:
            type: bool
            required: true
            description: whether this VPN is allowed to access the internet

          peers:
            type: list
            elements: dict
            required: true
            description: list of peers associated with this interface
            options:
              name:
                type: str
                required: true
                description: name of the peer, used as identifier in files and for filename
                routed_ips:
                  type: str
                  required: false
                  description: which IPs are allowed to be routed over the VPN interface, defaults to interface value
                dns:
                  type: str
                  required: false
                  description: which DNS is used for this VPN interface, defaults to interface value
                force:
                  type: bool
                  required: false
                  description: whether to force recreate this peer, overwriting keys
