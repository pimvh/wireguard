---
#
# wireguard
#
wg_range_v4: 10.13.37.0/25
# Github actions does not support IPv6
# wg_range_v6: 2001:610:158:2530::/125

wg_interfaces:
  - name: "wg0"
    domain: "test.example.com"
    wg_range_v4: "{{ wg_range_v4 }}"
    # wg_range_v6: "{{ wg_range_v6 }}"
    wg_port: 51234
    wg_show: true
    wg_client_config_dir: $HOME
    wg_client_config_storage_host: localhost
    generate_server_keys: false
    generate_preshared_key: false
    wg_dns: >
      {{ wg_range_v4 | ansible.utils.ipaddr('net') | ansible.utils.ipaddr('1') | split('/') | first }}
    wg_routed_ips: "{{ wg_routed_ips }}"
    allow_inet: true
    peers: "{{ peers }}"

peers:
  - name: pim-laptop

wg_routed_ips: "::/0, 1.0.0.0/8, 2.0.0.0/8, 3.0.0.0/8, 4.0.0.0/6, 8.0.0.0/7, 11.0.0.0/8, 12.0.0.0/6, 16.0.0.0/4, 32.0.0.0/3, 64.0.0.0/2, 128.0.0.0/3, 160.0.0.0/5, 168.0.0.0/6, 172.0.0.0/12, 172.32.0.0/11, 172.64.0.0/10, 172.128.0.0/9, 173.0.0.0/8, 174.0.0.0/7, 176.0.0.0/4, 192.0.0.0/9, 192.128.0.0/11, 192.160.0.0/13, 192.169.0.0/16, 192.170.0.0/15, 192.172.0.0/14, 192.176.0.0/12, 192.192.0.0/10, 193.0.0.0/8, 194.0.0.0/7, 196.0.0.0/6, 200.0.0.0/5, 208.0.0.0/4, 1.1.1.1/32, 1.1.1.1/32"
