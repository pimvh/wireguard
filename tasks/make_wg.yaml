---
- name: Rescope variables for readability
  ansible.builtin.set_fact:
    interface: "{{ wg_interface.name }}"
    peers: "{{ wg_interface.peers }}"
    domain: "{{ wg_interface.domain }}"
    wg_port: "{{ wg_interface.wg_port }}"
    wg_show: "{{ wg_interface.wg_show }}"
    wg_range_v4: "{{ wg_interface.wg_range_v4 }}"
    wg_range_v6: "{{ wg_interface.wg_range_v6 if wg_interface.wg_range_v6 is defined else None }}"
    wg_config_dir: "{{ wg_interface.wg_config_dir | default(wg_default_config_dir, True) }}"
    wg_client_config_dir: "{{ wg_interface.wg_client_config_dir | default(wg_default_client_config_dir, True) }}"
    wg_client_config_storage_host: "{{ wg_interface.wg_client_config_storage_host }}"
    generate_server_keys: "{{ wg_interface.generate_server_keys | default(False, True) }}"
    generate_preshared_key: "{{ wg_interface.generate_preshared_key | default(False, True) }}"
    wg_dns: "{{ wg_interface.wg_dns }}"
    wg_routed_ips: "{{ wg_interface.wg_routed_ips }}"

- name: Check wg is working
  ansible.builtin.command: which wg
  register: wg_command
  check_mode: false
  changed_when: false
  ignore_errors: true

- name: Check command on both wireguard hosts
  block:
    - name: Fail when wg command is not present
      ansible.builtin.fail:
        msg: The system does not have wireguard installed, cannot continue
      when: not wg_command.rc == 0

    - name: Check if wg is working on control host
      ansible.builtin.command: which wg
      register: wg_command_controller
      check_mode: false
      changed_when: false
      ignore_errors: true
      delegate_to: "{{ wg_client_config_storage_host }}"

    - name: Fail when wg command is not present
      ansible.builtin.fail:
        msg: The system does not have wireguard installed, cannot continue
      when: not wg_command_controller.rc == 0

- name: Check if wg config file exists
  ansible.builtin.stat:
    path: "{{ wg_config_dir }}/{{ interface }}.conf"
  register: wg_config_file
  become: true

- name: When no config file is found, force key generation
  ansible.builtin.set_fact:
    generate_preshared_key: true
    generate_server_keys: true
  when: not wg_config_file.stat.exists

- name: Preshared key
  ansible.builtin.include_tasks:
    file: preshared_key.yaml

- name: Generate required serverside keys
  ansible.builtin.include_tasks:
    file: serverside_keys.yaml

- name: Check that private, public key and presharedkey were set properly
  ansible.builtin.assert:
    that:
      - wg_server_private_key
      - wg_server_public_key
      - wg_preshared_key
    fail_msg: Keys are not properly defined!
    success_msg: Keys were found continuing!

- name: Generate client keys
  ansible.builtin.include_tasks: generate_client_keys.yaml
  loop: "{{ peers }}"
  loop_control:
    index_var: peer_id
    loop_var: peer

- name: Update peers
  ansible.builtin.set_fact:
    peers: "{{ new_peers }}"
  no_log: true

- name: Move wireguard server config
  ansible.builtin.template:
    src: server.conf.j2
    dest: "{{ wg_config_dir }}/wg0.conf"
    mode: u=rw,g=,o=
  become: true
  notify: restart wireguard service wg0

- name: Create client wireguard configs
  ansible.builtin.template:
    src: client.conf.j2
    dest: "{{ wg_client_config_dir }}/{{ inventory_hostname }}-{{ peer_id }}{% if peer.name %}-{{ peer.name }}{% endif %}.conf"
    mode: u=rw,g=rw,o=
  delegate_to: "{{ wg_client_config_storage_host }}"
  notify: restart wireguard service wg0
  loop: "{{ peers }}"
  loop_control:
    index_var: peer_id
    loop_var: peer

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Reset connection
  ansible.builtin.meta: reset_connection

- name: Check if wg is up
  ansible.builtin.command: wg
  become: true
  changed_when: true
  register: current_wg
  when: wg_show

- name: Show wg
  ansible.builtin.debug:
    msg: "{{ current_wg.stdout }}"
  when: wg_show
